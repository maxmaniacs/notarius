<head>

<title>Нотариус онлайн · Заверение для суда · Москва</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" onload="this.onload=null;this.rel='stylesheet'">

<link rel="stylesheet" href="styles.css">

<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #FBF8F1; color: #0C1626; font-feature-settings: "ss01","cv11"; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Playfair Display', Georgia, serif; }
  .font-mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .rule-thick { border-top: 2px solid #0C1626; }
  .rule-thin  { border-top: 1px solid #0C1626; }
  .rule-hair  { border-top: 1px solid rgba(12,22,38,.18); }
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity:1; transform:none; transition:none; } }
  .paper-grain { background-image: radial-gradient(rgba(12,22,38,.025) 1px, transparent 1px), radial-gradient(rgba(12,22,38,.02) 1px, transparent 1px); background-size: 3px 3px, 7px 7px; background-position: 0 0, 1px 2px; }
  .engraved { text-shadow: 0 1px 0 rgba(255,255,255,.55), 0 -1px 0 rgba(12,22,38,.12); }
  .seal { background: radial-gradient(circle at 35% 30%, #E8C879 0%, #C9A961 35%, #9E7A38 78%, #7A5A28 100%); box-shadow: inset 0 0 0 1px rgba(0,0,0,.18), inset 0 0 18px rgba(0,0,0,.25), 0 10px 30px -10px rgba(158,122,56,.5); }
  .link-underline { position: relative; }
  .link-underline::after { content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px; background:currentColor; transform:scaleX(.3); transform-origin:left; transition: transform .4s; }
  .link-underline:hover::after { transform:scaleX(1); }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .chev { transform: rotate(45deg); }
  .chev { transition: transform .35s cubic-bezier(.2,.7,.2,1); }
  .field:invalid[data-touched="true"] { border-color: #7A1F2B; }
  input, textarea, select { font-family: 'Inter', sans-serif; }
  @media (min-width: 1024px){ .col-rule > * + * { border-left: 1px solid rgba(12,22,38,.14); } }
</style>
</head>
<body>

<div id="root"></div>

<script>
  // Load Netlify Identity only when needed (invite/recovery tokens in URL)
  if (location.hash.includes('invite_token') || location.hash.includes('recovery_token') || location.hash.includes('confirmation_token')) {
    var s = document.createElement('script');
    s.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
    s.onload = function() {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          if (!user) {
            window.netlifyIdentity.on('login', function() {
              document.location.href = '/admin/';
            });
          }
        });
      }
    };
    document.head.appendChild(s);
  }
</script>
<script defer src="react.min.js"></script>
<script defer src="react-dom.min.js"></script>
<script defer src="lucide.min.js"></script>
<script defer src="app.js"></script>
</body>
</html>
