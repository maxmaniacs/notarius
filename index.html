const { useState, useEffect, useRef } = React;

function Icon({ name, className = "w-5 h-5", stroke = 1.5 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = "";
    const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons["Square"]);
    svg.setAttribute("stroke-width", stroke);
    svg.setAttribute("class", className);
    ref.current.appendChild(svg);
  }, [name, className, stroke]);
  return <span ref={ref} aria-hidden="true" />;
}

function Reveal({ children, as: Tag = "div", delay = 0, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { setTimeout(() => el.classList.add("in"), delay); io.unobserve(el); }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <Tag ref={ref} className={`reveal ${className}`}>{children}</Tag>;
}

/* ================= CONTACT ================= */
function Contact({ c }) {
  const s = c.contact;
  const [state, setState] = useState("idle");
  const [form, setForm] = useState({ name: "", phone: "", message: "", service: s.services[0], agree: false, newsletter: false });
  const [errors, setErrors] = useState({});

  function validate(f) {
    const e = {};
    if (!f.name.trim() || f.name.trim().length < 2) e.name = "Укажите имя";
    if (!/^[+\d()\-\s]{10,}$/.test(f.phone)) e.phone = "Введите номер телефона";
    if (!f.agree) e.agree = "Подтвердите согласие";
    return e;
  }
  function submit(ev) {
    ev.preventDefault();
    const e = validate(form);
    setErrors(e);
    if (Object.keys(e).length) return;
    setState("sending");
    setTimeout(() => setState("sent"), 900);
  }
  const field = "w-full bg-transparent border-b border-ink-900/25 focus:border-ink-900 outline-none py-3 text-[15px] text-ink-900 placeholder-ink-900/40 transition-colors";

  return (
    <section id="contact" className="py-24 md:py-32 bg-bone-100 border-t border-ink-900/10">
      <div className="max-w-7xl mx-auto px-5 md:px-10">
        <Reveal><SectionNumber n="07" label="Связаться" /></Reveal>
        <Reveal delay={100}>
          <h2 className="mt-6 font-display text-[36px] md:text-[56px] leading-[1.02] tracking-[-0.01em] text-ink-900 max-w-3xl">
            {s.heading} <span className="italic text-gold-600">{s.headingAccent}</span>
          </h2>
        </Reveal>
        <div className="mt-14 grid lg:grid-cols-12 gap-10 lg:gap-16">
          <Reveal delay={150} className="lg:col-span-7">
            {state === "sent" ? (
              <div className="border border-ink-900/20 bg-bone-50 p-8 md:p-12">
                <div className="w-12 h-12 seal rounded-full grid place-items-center mb-6">
                  <Icon name="Check" className="w-6 h-6 text-bone-50" stroke={2} />
                </div>
                <h3 className="font-display text-[28px] md:text-[32px] text-ink-900">{s.successTitle}</h3>
                <p className="mt-3 text-[15px] leading-relaxed text-ink-900/70 max-w-lg">{s.successText}</p>
                <button onClick={() => { setState("idle"); setForm({ name:"", phone:"", message:"", service:s.services[0], agree:true }); }}
                        className="mt-8 inline-flex items-center gap-2 text-ink-900 border-b border-ink-900 pb-1 text-[14px]">
                  Отправить ещё одну заявку <Icon name="ArrowRight" className="w-4 h-4" />
                </button>
              </div>
            ) : (
              <form onSubmit={submit} noValidate className="border border-ink-900/15 bg-bone-50 p-7 md:p-10">
                <div className="flex items-baseline justify-between mb-8">
                  <span className="font-mono text-[10.5px] tracking-[0.24em] uppercase text-ink-900/55">Форма заявки</span>
                  <span className="font-mono text-[10.5px] tracking-[0.24em] uppercase text-ink-900/45">№ {String(Math.floor(Math.random()*900)+100)}</span>
                </div>
                <div className="grid md:grid-cols-2 gap-x-8 gap-y-6">
                  <label className="block">
                    <span className="font-mono text-[10.5px] tracking-[0.22em] uppercase text-ink-900/55">Имя</span>
                    <input value={form.name} onChange={(e)=>setForm({...form, name:e.target.value})} className={field} placeholder="Как к вам обращаться" />
                    {errors.name && <span className="text-claret-600 font-mono text-[10.5px] tracking-[0.2em] uppercase mt-2 block">{errors.name}</span>}
                  </label>
                  <label className="block">
                    <span className="font-mono text-[10.5px] tracking-[0.22em] uppercase text-ink-900/55">Телефон</span>
                    <input value={form.phone} onChange={(e)=>setForm({...form, phone:e.target.value})} className={field} placeholder="+7 (___) ___-__-__" inputMode="tel" />
                    {errors.phone && <span className="text-claret-600 font-mono text-[10.5px] tracking-[0.2em] uppercase mt-2 block">{errors.phone}</span>}
                  </label>
                  <label className="block md:col-span-2">
                    <span className="font-mono text-[10.5px] tracking-[0.22em] uppercase text-ink-900/55">Что заверяем</span>
                    <select value={form.service} onChange={(e)=>setForm({...form, service:e.target.value})} className={field + " appearance-none pr-8"}>
                      {s.services.map(sv => <option key={sv}>{sv}</option>)}
                    </select>
                  </label>
                  <label className="block md:col-span-2">
                    <span className="font-mono text-[10.5px] tracking-[0.22em] uppercase text-ink-900/55">Кратко о ситуации</span>
                    <textarea value={form.message} onChange={(e)=>setForm({...form, message:e.target.value})} rows={3} className={field + " resize-none"} placeholder="Чтобы предварительно оценить объём и срок" />
                  </label>
                </div>
                <div className="mt-8 space-y-3">
                  <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" checked={form.agree} onChange={(e)=>setForm({...form, agree:e.target.checked})} className="mt-1 accent-ink-900" />
                    <span className="text-[13px] leading-relaxed text-ink-900/70">
                      Даю согласие на обработку персональных данных в соответствии с{" "}
                      <a href="/privacy.html" className="underline hover:text-ink-900">политикой конфиденциальности</a>{" "}
                      (обязательно).
                    </span>
                  </label>
                  {errors.agree && <div className="text-claret-600 font-mono text-[10.5px] tracking-[0.2em] uppercase">{errors.agree}</div>}
                  <label className="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" checked={form.newsletter} onChange={(e)=>setForm({...form, newsletter:e.target.checked})} className="mt-1 accent-ink-900" />
                    <span className="text-[13px] leading-relaxed text-ink-900/70">
                      {s.newsletter_label || "Согласен получать информационные сообщения об услугах"} (необязательно).
                    </span>
                  </label>
                </div>
                <button type="submit" disabled={state === "sending"} className="mt-8 inline-flex items-center gap-3 bg-ink-900 text-bone-50 px-7 py-4 text-[14.5px] tracking-wide hover:bg-ink-700 transition-colors disabled:opacity-60">
                  {state === "sending" ? "Отправляем…" : "Отправить заявку"}
                  <Icon name="ArrowRight" className="w-4 h-4" />
                </button>
              </form>
            )}
          </Reveal>
          <Reveal delay={280} className="lg:col-span-5">
            <div className="space-y-10">
              <div>
                <Kicker>Телефон</Kicker>
                <a href={`tel:${c.site.phoneHref}`} className="mt-2 block font-display text-[34px] md:text-[40px] text-ink-900 leading-tight hover:text-gold-600 transition-colors">{c.site.phone}</a>
                <a href={`https://wa.me/${c.site.whatsapp}`} className="mt-3 inline-flex items-center gap-2 text-[14px] text-ink-900/70 hover:text-ink-900">
                  <Icon name="MessageCircle" className="w-4 h-4 text-gold-600" /> Написать в WhatsApp
                </a>
              </div>
              <div className="rule-hair" />
              <div>
                <Kicker>Адрес</Kicker>
                <p className="mt-2 font-display text-[22px] text-ink-900 leading-snug">{s.addressTitle}<br/>{s.addressSub}</p>
                <p className="mt-2 text-[13.5px] text-ink-900/60">{s.metro}</p>
              </div>
              <div className="rule-hair" />
              <div>
                <Kicker>Часы работы</Kicker>
                <dl className="mt-3 space-y-1.5 text-[14.5px] text-ink-900/80 font-mono">
                  {s.hours.map((h, i) => (
                    <div key={i} className="flex justify-between"><dt>{h.day}</dt><dd>{h.time}</dd></div>
                  ))}
                </dl>
              </div>
              <div className="rule-hair" />
              <div className="relative border border-ink-900/15 aspect-[4/3] overflow-hidden">
                <svg className="absolute inset-0 w-full h-full" viewBox="0 0 400 300" preserveAspectRatio="none" aria-hidden="true">
                  <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0C1626" strokeOpacity="0.12" strokeWidth="0.5"/></pattern>
                    <pattern id="grid2" width="8" height="8" patternUnits="userSpaceOnUse"><path d="M 8 0 L 0 0 0 8" fill="none" stroke="#0C1626" strokeOpacity="0.05" strokeWidth="0.5"/></pattern>
                  </defs>
                  <rect width="400" height="300" fill="#F5F1E8"/>
                  <rect width="400" height="300" fill="url(#grid2)"/>
                  <rect width="400" height="300" fill="url(#grid)"/>
                  <path d="M 0 180 Q 160 160 400 220" stroke="#0C1626" strokeOpacity="0.25" strokeWidth="2" fill="none"/>
                  <path d="M 220 0 L 180 300" stroke="#0C1626" strokeOpacity="0.2" strokeWidth="2" fill="none"/>
                  <path d="M 0 60 L 400 90" stroke="#0C1626" strokeOpacity="0.18" strokeWidth="1.5" fill="none"/>
                  <circle cx="200" cy="150" r="26" fill="#C9A961" fillOpacity="0.2"/>
                  <circle cx="200" cy="150" r="8" fill="#0C1626"/>
                  <circle cx="200" cy="150" r="3" fill="#C9A961"/>
                </svg>
                <div className="absolute bottom-3 left-3 bg-bone-50 border border-ink-900/15 px-3 py-2">
                  <div className="font-mono text-[10px] tracking-[0.2em] text-ink-900/55">КООРДИНАТЫ</div>
                  <div className="font-mono text-[12px] text-ink-900">{s.coords}</div>
                </div>
              </div>
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

/* ================= APP ================= */
function App() {
  const [c, setC] = useState(null);
  const [err, setErr] = useState(null);
  useEffect(() => {
    fetch("content.json?v=" + Date.now())
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(setC)
      .catch(e => setErr(e.message));
  }, []);
  useEffect(() => { if (c) document.title = c.site.title; }, [c]);
  if (err) return <div className="p-10 font-mono text-sm text-claret-600">Ошибка загрузки content.json: {err}</div>;
  if (!c) return <div className="min-h-screen grid place-items-center text-ink-900/40 font-mono text-xs tracking-widest">ЗАГРУЗКА…</div>;
  return (
    <>
      <Nav c={c} />
      <main>
        <Hero c={c} />
        <Certify c={c} />
        <Cases c={c} />
        <Process c={c} />
        <Pricing c={c} />
        <WhyUs c={c} />
        <FAQ c={c} />
        <Contact c={c} />
      </main>
      <Footer c={c} />
      <CookieBanner privacyLink={c.footer.legal?.pd_link || "/privacy.html"} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
